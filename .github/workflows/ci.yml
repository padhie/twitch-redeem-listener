name: CI

on:
  push:
    branches: [ master ]
  pull_request:


jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -v ./src/...

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        run: go build -o out ./src/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: artifact
          path: out
          retention-days: 30
